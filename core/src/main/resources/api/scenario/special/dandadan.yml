# Course (Okarun ability /ddd course)
# start: Position de depart des 2 joueurs
# end: Ligne d'arrivee
# checkpoints: Points de passage obligatoires (dans l'ordre)
# return: Position de retour apres la course
# duration: Duree max de la course en secondes
course:
  start:
    x: 300
    y: 100
    z: 300
  end:
    x: 370
    y: 100
    z: 300
  checkpoints:
    0:
      x: 310
      y: 100
      z: 305
    1:
      x: 325
      y: 105
      z: 310
    2:
      x: 340
      y: 100
      z: 305
    3:
      x: 355
      y: 100
      z: 300
  return:
    x: 0
    y: 70
    z: 0
  duration: 30

