# DanDaDan UHC - Configuration des zones
#
# zones: Liste de TOUTES les positions de teleportation dans le monde DanDaDan.
#        Au debut de la partie, chaque Yokai actif se voit assigner une zone.
#        Les zones excedentes deviennent des zones ALEATOIRES.
#
#        Ajoutez autant de zones que vous voulez !
#        Plus il y a de zones, plus les joueurs ont de choix.
#
# trial_locations: Position d'epreuve propre a chaque Yokai (ou le joueur est TP pour accepter/refuser)
#

zones:
  0:  { x: 50,   y: 70, z: 50 }
  1:  { x: -30,  y: 70, z: 80 }
  2:  { x: 100,  y: 70, z: -20 }
